apiVersion: apps/v1
kind: Deployment
metadata:
  name: dreamwiseai-website
  namespace: production
  labels:
    app: dreamwiseai-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dreamwiseai-website
  template:
    metadata:
      labels:
        app: dreamwiseai-website
    spec:
      containers:
        - name: website
          image: dreamwiseai/website:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: dreamwiseai-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /en
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /en
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
