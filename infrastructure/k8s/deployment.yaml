apiVersion: apps/v1
kind: Deployment
metadata:
  name: dreamwiseai-website
  namespace: dreamwiseai-website-frontend
  labels:
    app: dreamwiseai-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dreamwiseai-website
  template:
    metadata:
      labels:
        app: dreamwiseai-website
    spec:
      containers:
        - name: website
          image: localhost:5000/dreamwiseai-website:utm-v2
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: dreamwiseai-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /en
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /en
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
