apiVersion: v1
kind: Namespace
metadata:
  name: dreamwiseai-website-frontend
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: quota
  namespace: dreamwiseai-website-frontend
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 2Gi
    limits.cpu: "2"
    limits.memory: 4Gi
    pods: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: limits
  namespace: dreamwiseai-website-frontend
spec:
  limits:
    - type: Container
      default: {cpu: "500m", memory: "512Mi"}
      defaultRequest: {cpu: "100m", memory: "128Mi"}
